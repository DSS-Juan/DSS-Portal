<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Docs · DSS Portal</title>
  <link rel="icon" href="Media/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <!-- TOPBAR -->
  <header class="topbar">
    <a class="brand" href="index.html">
      <div class="logo">
        <img class="logo-img" src="Media/DSS_Portal_Logo.png" alt="DSS Portal" />
      </div>
      <div class="brand-text">
        <h1>DSS Portal</h1>
        <p>Documentation</p>
      </div>
    </a>

    <nav class="nav">
      <a href="index.html#tools">Tools</a>
      <a href="index.html#tutorials">Tutorials</a>
      <a href="docs.html" class="active">Docs</a>
    </nav>
  </header>

  <main class="container">

    <!-- HERO -->
    <section class="docs-hero">
      <div class="hero-eyebrow">📋 Process Guides &amp; SOPs</div>
      <h2>Documentation</h2>
      <p>Step-by-step process guides for DSS workflows — organized by department. Add new SOPs directly in <code style="font-size:12px; color:var(--muted); background:var(--surface); padding:2px 6px; border-radius:5px;">data.js</code>.</p>
    </section>

    <!-- DOCS GRID -->
    <section class="section" id="docs">
      <div class="section-head">
        <h2>Process Guides</h2>
        <span id="docsCount" style="font-size:13px; color:var(--muted);"></span>
      </div>

      <!-- Rendered by docs.js -->
      <div class="docs-grid" id="docsGrid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer-wrap">
    <div class="container footer-inner">
      <p>© <span id="year"></span> DSS Portal · Built by Juan D Aguilera</p>
      <div class="footer-links">
        <a href="index.html#tools">Tools</a>
        <a href="index.html#tutorials">Tutorials</a>
        <a href="docs.html">Docs</a>
      </div>
    </div>
  </footer>

  <!-- data.js must load before docs.js -->
  <script src="data.js"></script>
  <script src="docs.js"></script>
</body>
</html>
